<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ.محمد زايد - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600,700" rel="stylesheet">
    
    <style>
        :root {
            --active-color: #e67e22; 
            --active-bg: #2a1608;
            --box-bg: rgba(20, 20, 35, 0.95);
        }

        /* ===== التعديل الجوهري هنا - body ===== */
        body {
            background-color: var(--active-bg);
            background-image: url('https://i.ibb.co/mphygbL/1771418359639-edit-224021117331829.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Cairo', 'Source Sans Pro', sans-serif;
            color: white;
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        #particles-js { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
            top: 0;
            left: 0;
        }
        
        .overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.9); 
            z-index: 0; 
        }

        /* ===== تعديل الـ login-box ===== */
        .login-box {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: auto;
            max-height: 90vh;
            overflow: hidden;
            border-radius: 24px;
            cursor: default;
            display: flex;
            flex-direction: column;
        }

        /* الإضاءة الدوارة */
        .login-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--active-color), transparent 30%);
            animation: rotate 4s linear infinite;
            z-index: 0;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .inner-content {
            position: relative;
            margin: 4px;
            background: rgba(25, 30, 40, 0.98);
            border-radius: inherit;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
            border-image: linear-gradient(to right, #6c5ce7, #48dbfb) 1;
            overflow-y: auto;
        }

        /* الحالة الأولية */
        .initial-state {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--active-color);
            width: 100%;
            height: 100%;
        }
        .login-box.expanded .initial-state { display: none; }

        @keyframes pulse-emoji {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .pulsing-icon {
            display: inline-block;
            animation: pulse-emoji 1.5s infinite ease-in-out;
            margin-left: 5px;
            font-size: 1.4rem;
        }

        /* محتوى النموذج */
        .form-content {
            opacity: 1;
            visibility: visible;
            width: 100%;
            padding: 20px 35px;
            transition: opacity 0.5s ease 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        

        /* التبويبات */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }
        .tab {
            padding-bottom: 10px;
            color: #94a3b8;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 1.1rem;
        }
        .tab.active {
            color: var(--active-color);
            border-bottom: 2px solid var(--active-color);
        }

        .form-section { width: 100%; display: none; animation: fadeIn 0.4s ease; }
        .form-section.active-form { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* حاوية Yeti/SVG */
        .svgContainer {
            position: relative; 
            width: 180px; 
            height: 180px; 
            margin: 0 auto 15px;
            border-radius: 50%;
            pointer-events: none;
        }
        .svgContainer div {
            position: relative; 
            width: 100%; 
            height: 0; 
            overflow: hidden;
            border-radius: 50%; 
            padding-bottom: 100%;
        }
        .svgContainer .mySVG {
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none;
        }
        .svgContainer:after {
            content: ""; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 10; 
            width: inherit; 
            height: inherit; 
            box-sizing: border-box;
            border: solid 2.5px #48dbfb; 
            border-radius: 50%;
        }

        /* تنسيقات الحقول */
        .inputGroup { margin: 0 0 1.2em; padding: 0; position: relative; width: 100%; }
        label { 
            margin: 0 0 5px; 
            display: block; 
            font-size: 1em; 
            color: #aaa; 
            font-weight: 600; 
            text-align: right;
        }
        
        input[type='email'], input[type="password"], input[type="text"], input[type="tel"] {
            display: block; 
            padding: 0 1em; 
            background-color: #1a1e29;
            border: solid 2px #333; 
            border-radius: 10px; 
            box-sizing: border-box;
            width: 100%; 
            height: 50px; 
            font-size: 1.1em; 
            color: #fff; 
            transition: 0.3s;
            text-align: right;
        }
        input[type="email"] { direction: ltr; text-align: left; }
        input:focus { outline: none; border-color: #48dbfb; box-shadow: 0 0 10px rgba(72, 219, 251, 0.3); }

        button.action-btn {
            display: block; 
            margin: 5px 0 0; 
            padding: 0; 
            background: linear-gradient(90deg, #6c5ce7, #48dbfb);
            border: none; 
            border-radius: 10px; 
            width: 100%; 
            height: 50px;
            font-size: 1.2em; 
            color: #FFF; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button.action-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); 
        }

        /* زر إظهار الباسورد */
        #showPasswordToggle, #showPasswordToggle2 {
            display: block; 
            padding: 0 1.45em 0 0; 
            position: absolute; 
            top: .25em; 
            left: 0; 
            font-size: 0.9em; 
            cursor: pointer; 
            color: #aaa;
        }
        #showPasswordToggle input, #showPasswordToggle2 input { position: absolute; z-index: -1; opacity: 0; }
        .indicator {
            position: absolute; 
            top: 2px; 
            right: 0; 
            height: .85em; 
            width: .85em;
            background-color: #1a1e29; 
            border: solid 2px #aaa; 
            border-radius: 3px;
        }
        .indicator:after {
            content: ""; 
            position: absolute; 
            left: .25em; 
            top: .025em; 
            width: .2em; 
            height: .5em;
            border: solid #48dbfb; 
            border-width: 0 3px 3px 0; 
            transform: rotate(45deg); 
            visibility: hidden;
        }
        input:checked ~ .indicator:after { visibility: visible; }

        /* زر الواتساب */
        .whatsapp-float { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 55px; 
            height: 55px; 
            background: #25D366; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            animation: pulse-wa 2s infinite; 
            text-decoration: none;
        }
        @keyframes pulse-wa { 
            0% {box-shadow: 0 0 0 0 rgba(37,211,102,0.7);} 
            70% {box-shadow: 0 0 0 15px rgba(37,211,102,0);} 
            100% {box-shadow: 0 0 0 0 rgba(37,211,102,0);} 
        }
        
        .signature { 
            margin-top: 15px; 
            font-size: 12px; 
            color: #94a3b8; 
            text-align: center; 
            width: 100%;
        }
        .signature a { 
            color: var(--active-color); 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>

    <script>

        particlesJS("particles-js", {

        // تعريف المتغيرات العامة
        const mainBox = document.getElementById('mainBox');
        const closeBtn = document.getElementById('closeBtn');
        const yetiBox = document.querySelector('.svgContainer');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');

        const signupForm = document.getElementById('signupForm');
        
        // عناصر Yeti/SVG
        const mySVG = document.querySelector('.svgContainer');
        const twoFingers = document.querySelector('.twoFingers');
        const armL = document.querySelector('.armL');
        const armR = document.querySelector('.armR');
        const eyeL = document.querySelector('.eyeL');
        const eyeR = document.querySelector('.eyeR');
        const nose = document.querySelector('.nose');
        const mouth = document.querySelector('.mouth');
        const mouthBG = document.querySelector('.mouthBG');
        const mouthSmallBG = document.querySelector('.mouthSmallBG');
        const mouthMediumBG = document.querySelector('.mouthMediumBG');
        const mouthLargeBG = document.querySelector('.mouthLargeBG');
        const mouthMaskPath = document.querySelector('#mouthMaskPath');
        const mouthOutline = document.querySelector('.mouthOutline');
        const tooth = document.querySelector('.tooth');
        const tongue = document.querySelector('.tongue');
        const chin = document.querySelector('.chin');
        const face = document.querySelector('.face');
        const eyebrow = document.querySelector('.eyebrow');
        const outerEarL = document.querySelector('.earL .outerEar');
        const outerEarR = document.querySelector('.earR .outerEar');
        const earHairL = document.querySelector('.earL .earHair');
        const earHairR = document.querySelector('.earR .earHair');
        const hair = document.querySelector('.hair');
        const bodyBG = document.querySelector('.bodyBGnormal');
        const bodyBGchanged = document.querySelector('.bodyBGchanged');
        
        // متغيرات Yeti
        const emailInputs = document.querySelectorAll('.track-email');
        const passInputs = document.querySelectorAll('.track-pass');
        
        // إعدادات Yeti
        let activeElement = null;
        let curEmailIndex = 0;
        let screenCenter = 0;
        let svgCoords = { x: 0, y: 0 };
        let emailCoords = { x: 0, y: 0 };
        let eyeLCoords = { x: 0, y: 0 };
        let eyeRCoords = { x: 0, y: 0 };
        let noseCoords = { x: 0, y: 0 };
        let mouthCoords = { x: 0, y: 0 };
        let emailScrollMax = 0;
        let chinMin = 0.5;
        let dFromC = 0;
        let mouthStatus = "small";
        let blinking = null;
        let eyeScale = 1;
        let eyesCovered = false;
        let showPasswordClicked = false;
        let eyeLAngle, eyeLX, eyeLY, eyeRAngle, eyeRX, eyeRY, noseAngle, noseX, noseY, mouthAngle, mouthX, mouthY, mouthR, chinX, chinY, chinS, faceX, faceY, faceSkew, eyebrowSkew, outerEarX, outerEarY, hairX, hairS;

        // وظائف Yeti
        function getPosition(el) {
            let xPos = 0, yPos = 0;
            while (el) { 
                xPos += (el.offsetLeft - el.scrollLeft + el.clientLeft); 
                yPos += (el.offsetTop - el.scrollTop + el.clientTop); 
                el = el.offsetParent; 
            }
            return { x: xPos, y: yPos };
        }

        function getAngle(x1, y1, x2, y2) { 
            return Math.atan2(y1 - y2, x1 - x2); 
        }

        function calculateFaceMove(e, inputElement) {
            if (!inputElement || !eyeL || !eyeR || !nose || !mouth || !chin || !face || !eyebrow || !outerEarL || !outerEarR || !earHairL || !earHairR || !hair) return;
            
            let carPos = inputElement.selectionEnd;
            const div = document.createElement('div');
            const span = document.createElement('span');
            const copyStyle = getComputedStyle(inputElement);
            let caretCoords = {};
            
            if (carPos == null || carPos == 0) { 
                carPos = inputElement.value.length; 
            }
            
            [].forEach.call(copyStyle, function(prop) { 
                div.style[prop] = copyStyle[prop]; 
            });
            
            div.style.position = 'absolute'; 
            div.style.direction = 'ltr';
            div.style.textAlign = 'left';
            document.body.appendChild(div);
            div.textContent = inputElement.value.substr(0, carPos); 
            span.textContent = inputElement.value.substr(carPos) || '.'; 
            div.appendChild(span);
            
            const inputCoords = getPosition(inputElement);
            
            if (inputElement.scrollWidth <= emailScrollMax) {
                caretCoords = getPosition(span); 
                dFromC = screenCenter - (caretCoords.x + inputCoords.x);
                eyeLAngle = getAngle(eyeLCoords.x, eyeLCoords.y, inputCoords.x + caretCoords.x, inputCoords.y + 25);
                eyeRAngle = getAngle(eyeRCoords.x, eyeRCoords.y, inputCoords.x + caretCoords.x, inputCoords.y + 25);
                noseAngle = getAngle(noseCoords.x, noseCoords.y, inputCoords.x + caretCoords.x, inputCoords.y + 25);
                mouthAngle = getAngle(mouthCoords.x, mouthCoords.y, inputCoords.x + caretCoords.x, inputCoords.y + 25);
            } else {
                eyeLAngle = getAngle(eyeLCoords.x, eyeLCoords.y, inputCoords.x + emailScrollMax, inputCoords.y + 25);
                eyeRAngle = getAngle(eyeRCoords.x, eyeRCoords.y, inputCoords.x + emailScrollMax, inputCoords.y + 25);
                noseAngle = getAngle(noseCoords.x, noseCoords.y, inputCoords.x + emailScrollMax, inputCoords.y + 25);
                mouthAngle = getAngle(mouthCoords.x, mouthCoords.y, inputCoords.x + emailScrollMax, inputCoords.y + 25);
            }
            
            eyeLX = Math.cos(eyeLAngle) * 20; 
            eyeLY = Math.sin(eyeLAngle) * 10;
            eyeRX = Math.cos(eyeRAngle) * 20; 
            eyeRY = Math.sin(eyeRAngle) * 10;
            noseX = Math.cos(noseAngle) * 23; 
            noseY = Math.sin(noseAngle) * 10;
            mouthX = Math.cos(mouthAngle) * 23; 
            mouthY = Math.sin(mouthAngle) * 10; 
            mouthR = Math.cos(mouthAngle) * 6;
            chinX = mouthX * 0.8; 
            chinY = mouthY * 0.5; 
            chinS = 1 - ((dFromC * 0.15) / 100);
            
            if (chinS > 1) { 
                chinS = 1 - (chinS - 1); 
                if (chinS < chinMin) { 
                    chinS = chinMin; 
                } 
            }
            
            faceX = mouthX * 0.3; 
            faceY = mouthY * 0.4; 
            faceSkew = Math.cos(mouthAngle) * 5; 
            eyebrowSkew = Math.cos(mouthAngle) * 25;
            outerEarX = Math.cos(mouthAngle) * 4; 
            outerEarY = Math.cos(mouthAngle) * 5; 
            hairX = Math.cos(mouthAngle) * 6; 
            hairS = 1.2;  
            
            TweenMax.to(eyeL, 1, { x: -eyeLX, y: -eyeLY, ease: Expo.easeOut }); 
            TweenMax.to(eyeR, 1, { x: -eyeRX, y: -eyeRY, ease: Expo.easeOut });
            TweenMax.to(nose, 1, { x: -noseX, y: -noseY, rotation: mouthR, transformOrigin: "center center", ease: Expo.easeOut });
            TweenMax.to(mouth, 1, { x: -mouthX, y: -mouthY, rotation: mouthR, transformOrigin: "center center", ease: Expo.easeOut });
            TweenMax.to(chin, 1, { x: -chinX, y: -chinY, scaleY: chinS, ease: Expo.easeOut });
            TweenMax.to(face, 1, { x: -faceX, y: -faceY, skewX: -faceSkew, transformOrigin: "center top", ease: Expo.easeOut });
            TweenMax.to(eyebrow, 1, { x: -faceX, y: -faceY, skewX: -eyebrowSkew, transformOrigin: "center top", ease: Expo.easeOut });
            TweenMax.to(outerEarL, 1, { x: outerEarX, y: -outerEarY, ease: Expo.easeOut }); 
            TweenMax.to(outerEarR, 1, { x: outerEarX, y: outerEarY, ease: Expo.easeOut });
            TweenMax.to(earHairL, 1, { x: -outerEarX, y: -outerEarY, ease: Expo.easeOut }); 
            TweenMax.to(earHairR, 1, { x: -outerEarX, y: outerEarY, ease: Expo.easeOut });
            TweenMax.to(hair, 1, { x: hairX, scaleY: hairS, transformOrigin: "center bottom", ease: Expo.easeOut });
            
            document.body.removeChild(div);
        }

        function onEmailInput(e) {
            const input = e.target;
            calculateFaceMove(e, input);
            
            const value = input.value; 
            curEmailIndex = value.length;
            
            if (curEmailIndex > 0) {
                if (mouthStatus == "small") {
                    mouthStatus = "medium";
                    if (tooth && tongue) {
                        TweenMax.to(tooth, 1, { x: 0, y: 0, ease: Expo.easeOut }); 
                        TweenMax.to(tongue, 1, { x: 0, y: 1, ease: Expo.easeOut });
                    }
                    if (eyeL && eyeR) {
                        TweenMax.to([eyeL, eyeR], 1, { scaleX: 0.85, scaleY: 0.85, ease: Expo.easeOut }); 
                        eyeScale = 0.85;
                    }
                }
                if (value.includes("@")) {
                    mouthStatus = "large";
                    if (tooth && tongue) {
                        TweenMax.to(tooth, 1, { x: 3, y: -2, ease: Expo.easeOut }); 
                        TweenMax.to(tongue, 1, { y: 2, ease: Expo.easeOut });
                    }
                    if (eyeL && eyeR) {
                        TweenMax.to([eyeL, eyeR], 1, { scaleX: 0.65, scaleY: 0.65, ease: Expo.easeOut, transformOrigin: "center center" }); 
                        eyeScale = 0.65;
                    }
                } else {
                    mouthStatus = "medium";
                    if (tooth && tongue) {
                        TweenMax.to(tooth, 1, { x: 0, y: 0, ease: Expo.easeOut }); 
                        TweenMax.to(tongue, 1, { x: 0, y: 1, ease: Expo.easeOut });
                    }
                    if (eyeL && eyeR) {
                        TweenMax.to([eyeL, eyeR], 1, { scaleX: 0.85, scaleY: 0.85, ease: Expo.easeOut }); 
                        eyeScale = 0.85;
                    }
                }
            } else {
                mouthStatus = "small";
                if (tooth && tongue) {
                    TweenMax.to(tooth, 1, { x: 0, y: 0, ease: Expo.easeOut }); 
                    TweenMax.to(tongue, 1, { y: 0, ease: Expo.easeOut });
                }
                if (eyeL && eyeR) {
                    TweenMax.to([eyeL, eyeR], 1, { scaleX: 1, scaleY: 1, ease: Expo.easeOut }); 
                    eyeScale = 1;
                }
            }
        }

        function onEmailFocus(e) { 
            activeElement = "email"; 
            onEmailInput(e); 
        }
        
        function onEmailBlur(e) { 
            activeElement = null; 
            setTimeout(function() { 
                if (activeElement != "email") resetFace(); 
            }, 100); 
        }
        
        function onPasswordFocus(e) { 
            activeElement = "password"; 
            if (!eyesCovered) coverEyes(); 
        }
        
        function onPasswordBlur(e) { 
            activeElement = null; 
            setTimeout(function() { 
                if (activeElement != "toggle" && activeElement != "password") uncoverEyes(); 
            }, 100); 
        }
        
        function onPasswordToggleFocus(e) { 
            activeElement = "toggle"; 
            if (!eyesCovered) coverEyes(); 
        }
        
        function onPasswordToggleBlur(e) { 
            activeElement = null; 
            if (!showPasswordClicked) 
                setTimeout(function() { 
                    if (activeElement != "password" && activeElement != "toggle") uncoverEyes(); 
                }, 100); 
        }
        
        function onPasswordToggleMouseDown(e) { 
            showPasswordClicked = true; 
        }
        
        function onPasswordToggleMouseUp(e) { 
            showPasswordClicked = false; 
        }
        
        function onPasswordToggleChange(e, passInput) {
            setTimeout(function() {
                if (e.target.checked) { 
                    passInput.type = "text"; 
                    if (twoFingers) spreadFingers(); 
                } else { 
                    passInput.type = "password"; 
                    if (twoFingers) closeFingers(); 
                } 
            }, 100);
        }
        
        function spreadFingers() { 
            if (twoFingers) {
                TweenMax.to(twoFingers, 0.35, { transformOrigin: "bottom left", rotation: 30, x: -9, y: -2, ease: Power2.easeInOut }); 
            }
        }
        
        function closeFingers() { 
            if (twoFingers) {
                TweenMax.to(twoFingers, 0.35, { transformOrigin: "bottom left", rotation: 0, x: 0, y: 0, ease: Power2.easeInOut }); 
            }
        }
        
        function coverEyes() {
            if (armL && armR && bodyBG && bodyBGchanged) {
                TweenMax.killTweensOf([armL, armR]); 
                TweenMax.set([armL, armR], { visibility: "visible" });
                TweenMax.to(armL, 0.45, { x: -93, y: 10, rotation: 0, ease: Quad.easeOut });
                TweenMax.to(armR, 0.45, { x: -93, y: 10, rotation: 0, ease: Quad.easeOut, delay: 0.1 });
                TweenMax.to(bodyBG, 0.45, { morphSVG: bodyBGchanged, ease: Quad.easeOut });
                eyesCovered = true;
            }
        }
        
        function uncoverEyes() {
            if (armL && armR && bodyBG) {
                TweenMax.killTweensOf([armL, armR]);
                TweenMax.to(armL, 1.35, { y: 220, ease: Quad.easeOut }); 
                TweenMax.to(armL, 1.35, { rotation: 105, ease: Quad.easeOut, delay: 0.1 });
                TweenMax.to(armR, 1.35, { y: 220, ease: Quad.easeOut }); 
                TweenMax.to(armR, 1.35, { rotation: -105, ease: Quad.easeOut, delay: 0.1, onComplete: function() { 
                    TweenMax.set([armL, armR], { visibility: "hidden" }); 
                }});
                TweenMax.to(bodyBG, 0.45, { morphSVG: bodyBG, ease: Quad.easeOut });
                eyesCovered = false;
            }
        }
        
        function resetFace() {
            if (eyeL && eyeR && nose && mouth && chin && face && eyebrow && outerEarL && outerEarR && earHairL && earHairR && hair) {
                TweenMax.to([eyeL, eyeR], 1, { x: 0, y: 0, ease: Expo.easeOut }); 
                TweenMax.to(nose, 1, { x: 0, y: 0, scaleX: 1, scaleY: 1, ease: Expo.easeOut });
                TweenMax.to(mouth, 1, { x: 0, y: 0, rotation: 0, ease: Expo.easeOut }); 
                TweenMax.to(chin, 1, { x: 0, y: 0, scaleY: 1, ease: Expo.easeOut });
                TweenMax.to([face, eyebrow], 1, { x: 0, y: 0, skewX: 0, ease: Expo.easeOut });
                TweenMax.to([outerEarL, outerEarR, earHairL, earHairR, hair], 1, { x: 0, y: 0, scaleY: 1, ease: Expo.easeOut });
            }
        }
        
        function startBlinking(delay) {
            delay = delay ? Math.floor(Math.random() * Math.floor(delay)) : 1;
            if (eyeL && eyeR) {
                blinking = TweenMax.to([eyeL, eyeR], 0.1, { 
                    delay: delay, 
                    scaleY: 0, 
                    yoyo: true, 
                    repeat: 1, 
                    transformOrigin: "center center", 
                    onComplete: function() { startBlinking(12); } 
                });
            }
        }

        function initYeti() {
            if (!mySVG || !eyeL || !eyeR || !nose || !mouth) return;
            
            svgCoords = getPosition(mySVG); 
            
            const loginEmail = document.getElementById('loginEmail');
            if (loginEmail) {
                emailCoords = getPosition(loginEmail);
                screenCenter = svgCoords.x + (mySVG.offsetWidth / 2);
                emailScrollMax = loginEmail.scrollWidth;
            }
            
            eyeLCoords = { x: svgCoords.x + 84, y: svgCoords.y + 76 }; 
            eyeRCoords = { x: svgCoords.x + 113, y: svgCoords.y + 76 };
            noseCoords = { x: svgCoords.x + 97, y: svgCoords.y + 81 }; 
            mouthCoords = { x: svgCoords.x + 100, y: svgCoords.y + 100 };
            
            // إعداد الأذرع
            if (armL && armR) {
                TweenMax.set(armL, { x: -93, y: 220, rotation: 105, transformOrigin: "top left" }); 
                TweenMax.set(armR, { x: -93, y: 220, rotation: -105, transformOrigin: "top right" });
            }
            
            if (mouth) {
                TweenMax.set(mouth, { transformOrigin: "center center" });
            }
            
            startBlinking(5);
        }

        // أحداث Yeti للإيميل
        emailInputs.forEach(input => {
            input.addEventListener('focus', onEmailFocus);
            input.addEventListener('blur', onEmailBlur);
            input.addEventListener('input', onEmailInput);
        });

        // أحداث Yeti للباسورد
        passInputs.forEach(input => {
            input.addEventListener('focus', onPasswordFocus);
            input.addEventListener('blur', onPasswordBlur);
        });

        // أحداث Show Password
        const showPassCheck = document.getElementById('showPasswordCheck');
        const showPassCheck2 = document.getElementById('showPasswordCheck2');
        const passInput = document.getElementById('loginPassword');
        const passInput2 = document.getElementById('signupPassword');
        
        if (showPassCheck && passInput) {
            showPassCheck.addEventListener('change', (e) => onPasswordToggleChange(e, passInput));
            showPassCheck.addEventListener('focus', onPasswordToggleFocus);
            showPassCheck.addEventListener('blur', onPasswordToggleBlur);
            
            const toggleLabel = document.getElementById('showPasswordToggle');
            if (toggleLabel) {
                toggleLabel.addEventListener('mouseup', onPasswordToggleMouseUp);
                toggleLabel.addEventListener('mousedown', onPasswordToggleMouseDown);
            }
        }
        
        if (showPassCheck2 && passInput2) {
            showPassCheck2.addEventListener('change', (e) => onPasswordToggleChange(e, passInput2));
            showPassCheck2.addEventListener('focus', onPasswordToggleFocus);
            showPassCheck2.addEventListener('blur', onPasswordToggleBlur);
            
            const toggleLabel2 = document.getElementById('showPasswordToggle2');
            if (toggleLabel2) {
                toggleLabel2.addEventListener('mouseup', onPasswordToggleMouseUp);
                toggleLabel2.addEventListener('mousedown', onPasswordToggleMouseDown);
            }
        }

        // أحداث التبويبات
        tabLogin.onclick = () => {
            tabLogin.classList.add('active'); 
            tabRegister.classList.remove('active');
            loginForm.classList.add('active-form'); 
            signupForm.classList.remove('active-form');
            setTimeout(initYeti, 300);
        };
        
        tabRegister.onclick = () => {
            tabRegister.classList.add('active'); 
            tabLogin.classList.remove('active');
            signupForm.classList.add('active-form'); 
            loginForm.classList.remove('active-form');
            setTimeout(initYeti, 300);
        };
                // وظائف المصادقة
        async function handleAuth(e, isSignup) {
            e.preventDefault();
            
            const email = document.getElementById(isSignup ? 'signupEmail' : 'loginEmail').value;
            const password = document.getElementById(isSignup ? 'signupPassword' : 'loginPassword').value;

            if (isSignup) {
                const name = document.getElementById('signupName').value.trim();
                const phone = document.getElementById('signupPhone').value.trim();
                
                if (name.split(' ').length < 3) {
                    Swal.fire({ icon: 'error', title: 'عذراً', text: 'يرجى كتابة الاسم الثلاثي باللغة العربية الفصحى.' });
                    return;
                }
                if (!/^\d{11}$/.test(phone)) {
                    Swal.fire({ icon: 'error', title: 'خطأ في الرقم', text: 'يجب أن يتكون رقم الهاتف من 11 رقماً بالضبط.' });
                    return;
                }
            }

            Swal.fire({
                title: isSignup ? 'جاري إنشاء الحساب...' : 'جاري تسجيل الدخول...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                let result;
                if (isSignup) {
                    const name = document.getElementById('signupName').value;
                    const phone = document.getElementById('signupPhone').value;
                    
                    // 1. فحص رقم الموبايل لوحده
                    const { data: phoneExists, error: phoneError } = await window.supabase
                        .rpc('check_phone_exists', { phone_to_check: phone });
                        
                    // دي حماية ليك عشان لو دالة الـ SQL مش شغالة، ميطنشهاش ويكريت حساب!
                    if (phoneError) {
                        Swal.fire('تنبيه هام للمطور', 'دالة فحص الرقم (check_phone_exists) مش موجودة. لازم تعمل لها Run من الـ SQL Editor في Supabase الأول.', 'error');
                        return; // وقف التسجيل خالص
                    }

                    if (phoneExists) {
                        throw new Error('account_exists'); // لو الرقم لوحده موجود، هيوقف ويرمي خطأ التكرار
                    }

                    // 2. لو الرقم مش موجود، هيروح يفحص الإيميل ويكريت الحساب
                    result = await window.supabase.auth.signUp({
                        email, password,
                        options: { data: { full_name: name, phone: phone } }
                    });

                    // 3. فحص الإيميل لوحده (لو الإيميل متسجل قبل كده، Supabase بيرجع هويات فاضية)
                    if (result.data?.user?.identities?.length === 0) {
                        throw new Error('account_exists'); 
                    }
                } else {
                    // تسجيل الدخول العادي
                    result = await window.supabase.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;

                Swal.fire({
                    icon: 'success',
                    title: isSignup ? 'تم إنشاء الحساب!' : 'تم الدخول بنجاح!',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => redirectUser(email));

            } catch (err) {
                let msg = err.message || "";
                
                // ===== معالجة خطأ "الحساب موجود مسبقاً" (لو الإيميل أو الرقم بس اللي متكررين) =====
                if (msg === 'account_exists' || msg.includes('User already registered') || msg.includes('already registered')) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'الحساب موجود بالفعل!',
                        text: 'رقم الموبايل أو الإيميل ده متسجل عندنا قبل كده.',
                        showCancelButton: true,
                        confirmButtonText: 'حاول مجدداً 🔄',
                        cancelButtonText: 'تواصل مع الدعم 💬',
                        confirmButtonColor: '#6c5ce7',
                        cancelButtonColor: '#25D366', // لون الواتساب
                        reverseButtons: true
                    }).then((result) => {
                        // لو ضغط على زر "تواصل مع الدعم"
                        if (result.dismiss === Swal.DismissReason.cancel) {
                            window.open('https://wa.me/201001809230', '_blank');
                        }
                    });
                } 
                else if (msg.includes('Invalid login') || msg.includes('Invalid credentials')) {
                    Swal.fire({
                        icon: 'question',
                        title: 'بيانات غير صحيحة',
                        text: 'تأكد من البيانات أو أنشئ حساباً جديداً',
                        showCancelButton: true,
                        confirmButtonText: 'محاولة أخرى',
                        cancelButtonText: 'إنشاء حساب جديد'
                    }).then((r) => { if (r.dismiss === Swal.DismissReason.cancel) tabRegister.click(); });
                } 
                else {
                    Swal.fire({ icon: 'error', title: 'حدث خطأ', text: msg });
                }
            }
        }

        function redirectUser(email) {
            if (email && email.trim().toLowerCase() === window.ADMIN_EMAIL.trim().toLowerCase()) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'course.html';
            }
        }

        loginForm.onsubmit = (e) => handleAuth(e, false);
        signupForm.onsubmit = (e) => handleAuth(e, true);

        if (window.supabase) {
            window.supabase.auth.onAuthStateChange((event, session) => {
                if (session && event === 'INITIAL_SESSION') {
                    redirectUser(session.user.email);
                }
            });
        }

        mainBox.classList.add('expanded');
        setTimeout(initYeti, 500);
    </script>                  
</body>
